<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Menu — Design Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #f8f8f6;
  color: #0a0a0a;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── Fake hero ───────────────────────────────────────────────── */
.hero {
  height: 100vh;
  position: relative;
  display: flex;
  align-items: flex-end;
  padding: 0 clamp(24px, 5vw, 80px) clamp(60px, 10vh, 110px);
}
.hero__bg {
  position: absolute; inset: 0;
  background: url('assets/motel-pics/Deluxe King suite with kitchen/5.png') center/cover no-repeat;
}
.hero__bg::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(6,5,4,.75) 0%, rgba(6,5,4,.1) 55%, transparent 100%);
}
.hero__text { position: relative; z-index: 1; }
.hero__eyebrow {
  font-size: 9px; letter-spacing: .3em; text-transform: uppercase;
  color: rgba(255,255,255,.45); margin-bottom: 14px;
}
.hero__title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(52px, 9vw, 100px);
  font-weight: 300; line-height: .95;
  color: #fff;
}

/* ── Top bar ─────────────────────────────────────────────────── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 400;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 clamp(20px, 4vw, 56px);
  transition: background .4s ease;
}
body.scrolled .topbar { background: #faf9f7; box-shadow: 0 1px 0 rgba(10,10,10,.07); }

.topbar__logo img {
  height: 34px; width: auto;
  filter: brightness(0) invert(1);
  transition: filter .4s ease;
}
body.scrolled .topbar__logo img { filter: none; }

/* Burger button */
.burger {
  background: none; border: none; cursor: pointer;
  padding: 8px; margin: -8px;
  display: flex; flex-direction: column;
  gap: 6px;
  z-index: 500;
  position: relative;
}
.burger__bar {
  display: block;
  height: 1px;
  background: #fff;
  transition: background .4s ease, transform .42s cubic-bezier(0.22,1,0.36,1), opacity .28s ease, width .42s cubic-bezier(0.22,1,0.36,1);
  transform-origin: center;
}
.burger__bar:nth-child(1) { width: 32px; }
.burger__bar:nth-child(2) { width: 22px; }
.burger__bar:nth-child(3) { width: 14px; }

body.scrolled  .burger__bar { background: #0a0a0a; }
body.menu-open .burger__bar { background: #fff !important; }
body.menu-open .burger__bar:nth-child(1) { transform: translateY(7px) rotate(45deg); width: 28px; }
body.menu-open .burger__bar:nth-child(2) { opacity: 0; }
body.menu-open .burger__bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); width: 28px; }

/* ── MENU OVERLAY ────────────────────────────────────────────── */
.menu-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: #0c0b0a;
  display: flex;
  flex-direction: column;
  /* Hidden state */
  opacity: 0;
  visibility: hidden;
  transition: opacity .5s ease, visibility 0s linear .5s;
}
body.menu-open .menu-overlay {
  opacity: 1;
  visibility: visible;
  transition: opacity .5s ease, visibility 0s linear 0s;
}

/* Layout inside overlay */
.menu-overlay__body {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 40%;
  min-height: 0;
  padding-top: 68px; /* match topbar */
}

/* ── Left: nav links ─────────────────────────────────────────── */
.menu-nav {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 clamp(28px, 6vw, 96px);
  list-style: none;
}

.menu-nav__item {
  overflow: hidden;  /* clips the sliding link */
  padding: 2px 0;
}

.menu-nav__link {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(38px, 6vw, 76px);
  font-weight: 300;
  line-height: 1.2;
  color: rgba(255,255,255,.22);
  text-decoration: none;
  letter-spacing: -.01em;
  /* Starts hidden below its container */
  transform: translateY(105%);
  transition: transform .6s cubic-bezier(0.22,1,0.36,1), color .3s ease;
  white-space: nowrap;
}

/* Stagger slide-up when open */
body.menu-open .menu-nav__item:nth-child(1) .menu-nav__link { transform: translateY(0); transition-delay: .06s; color: rgba(255,255,255,.75); }
body.menu-open .menu-nav__item:nth-child(2) .menu-nav__link { transform: translateY(0); transition-delay: .12s; color: rgba(255,255,255,.75); }
body.menu-open .menu-nav__item:nth-child(3) .menu-nav__link { transform: translateY(0); transition-delay: .18s; color: rgba(255,255,255,.75); }
body.menu-open .menu-nav__item:nth-child(4) .menu-nav__link { transform: translateY(0); transition-delay: .24s; color: rgba(255,255,255,.75); }
body.menu-open .menu-nav__item:nth-child(5) .menu-nav__link { transform: translateY(0); transition-delay: .30s; color: rgba(255,255,255,.75); }
body.menu-open .menu-nav__item:nth-child(6) .menu-nav__link { transform: translateY(0); transition-delay: .36s; color: rgba(255,255,255,.75); }

.menu-nav__link:hover { color: #fff !important; }

/* ── Right: image panel ──────────────────────────────────────── */
.menu-image {
  position: relative;
  overflow: hidden;
}
.menu-image::before {
  /* gradient blends image into dark left side */
  content: '';
  position: absolute;
  inset: 0;
  z-index: 2;
  background: linear-gradient(to right, #0c0b0a 0%, transparent 30%);
}
.menu-image__slide {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transform: scale(1.04);
  transition: opacity .7s ease, transform .7s ease;
}
.menu-image__slide.active {
  opacity: 1;
  transform: scale(1);
}

/* ── Footer strip ────────────────────────────────────────────── */
.menu-foot {
  flex-shrink: 0;
  border-top: 1px solid rgba(255,255,255,.07);
  padding: 18px clamp(28px, 6vw, 96px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  /* Fades in after links */
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .4s ease, transform .4s ease;
}
body.menu-open .menu-foot {
  opacity: 1;
  transform: translateY(0);
  transition-delay: .44s;
}

.menu-foot__links {
  display: flex; align-items: center;
  flex-wrap: wrap; gap: 6px 24px;
  list-style: none;
}
.menu-foot__links a {
  font-size: 9.5px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: rgba(255,255,255,.3);
  text-decoration: none;
  transition: color .2s;
}
.menu-foot__links a:hover { color: rgba(255,255,255,.7); }

.menu-foot__contact {
  font-size: 9.5px;
  letter-spacing: .14em;
  color: rgba(255,255,255,.3);
  white-space: nowrap;
}

/* ── Mobile ──────────────────────────────────────────────────── */
@media (max-width: 700px) {
  .menu-overlay__body { grid-template-columns: 1fr; }
  .menu-image { display: none; }
  .menu-nav__link { font-size: clamp(32px, 9vw, 52px); white-space: normal; }
  .menu-foot { flex-direction: column; align-items: flex-start; gap: 10px; }
}
  </style>
</head>
<body>

<!-- Topbar -->
<header class="topbar">
  <a class="topbar__logo" href="#">
    <img src="assets/logo_transparent_hd.png" alt="Motel Mediteran" />
  </a>
  <button class="burger" id="burgerBtn" aria-label="Toggle menu">
    <span class="burger__bar"></span>
    <span class="burger__bar"></span>
    <span class="burger__bar"></span>
  </button>
</header>

<!-- Menu overlay -->
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-overlay__body">

    <!-- Nav links -->
    <ul class="menu-nav" id="menuNav">
      <li class="menu-nav__item">
        <a class="menu-nav__link" href="index.html"
           data-index="0">Home</a>
      </li>
      <li class="menu-nav__item">
        <a class="menu-nav__link" href="rooms.html"
           data-index="1">Rooms &amp; Suites</a>
      </li>
      <li class="menu-nav__item">
        <a class="menu-nav__link" href="amenities.html"
           data-index="2">Amenities</a>
      </li>
      <li class="menu-nav__item">
        <a class="menu-nav__link" href="things-to-do.html"
           data-index="3">Things To Do</a>
      </li>
      <li class="menu-nav__item">
        <a class="menu-nav__link" href="directions.html"
           data-index="4">Location</a>
      </li>
      <li class="menu-nav__item">
        <a class="menu-nav__link" href="book.html"
           data-index="5">Reserve a Room</a>
      </li>
    </ul>

    <!-- Image panel -->
    <div class="menu-image" id="menuImage">
      <div class="menu-image__slide active" style="background-image:url('assets/motel-pics/Deluxe King suite with kitchen/5.png')"></div>
      <div class="menu-image__slide" style="background-image:url('assets/motel-pics/std king/1.png')"></div>
      <div class="menu-image__slide" style="background-image:url('assets/motel-pics/POOL/pool.png')"></div>
      <div class="menu-image__slide" style="background-image:url('assets/motel-pics/EXTERIOR PICS/1.png')"></div>
      <div class="menu-image__slide" style="background-image:url('assets/motel-pics/Deluxe King suite with kitchen/3.png')"></div>
      <div class="menu-image__slide" style="background-image:url('assets/motel-pics/Deluxe King suite with kitchen/1.png')"></div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="menu-foot">
    <ul class="menu-foot__links">
      <li><a href="faqs.html">FAQs</a></li>
      <li><a href="hotel-policies.html">Policies</a></li>
      <li><a href="accessibility.html">Accessibility</a></li>
      <li><a href="gallery.html">Gallery</a></li>
    </ul>
    <span class="menu-foot__contact">(760) 743-2300 &nbsp;·&nbsp; Escondido, CA</span>
  </footer>
</div>

<!-- Hero -->
<section class="hero">
  <div class="hero__bg"></div>
  <div class="hero__text">
    <p class="hero__eyebrow">Escondido · California</p>
    <h1 class="hero__title">Motel<br>Mediteran</h1>
  </div>
</section>

<script>
(function () {
  var btn     = document.getElementById('burgerBtn');
  var overlay = document.getElementById('menuOverlay');
  var slides  = document.querySelectorAll('.menu-image__slide');
  var links   = document.querySelectorAll('.menu-nav__link');
  var current = 0;

  function setSlide(i) {
    slides[current].classList.remove('active');
    current = i;
    slides[current].classList.add('active');
  }

  function openMenu() {
    document.body.classList.add('menu-open');
    document.body.style.overflow = 'hidden';
    btn.setAttribute('aria-expanded', 'true');
  }

  function closeMenu() {
    document.body.classList.remove('menu-open');
    document.body.style.overflow = '';
    btn.setAttribute('aria-expanded', 'false');
  }

  btn.addEventListener('click', function () {
    document.body.classList.contains('menu-open') ? closeMenu() : openMenu();
  });

  // Image swap on hover
  links.forEach(function (link) {
    link.addEventListener('mouseenter', function () {
      var i = parseInt(link.getAttribute('data-index'), 10);
      if (!isNaN(i) && i !== current) setSlide(i);
    });
  });

  // Close on Escape
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeMenu();
  });

  // Scroll state for topbar
  window.addEventListener('scroll', function () {
    document.body.classList.toggle('scrolled', window.scrollY > 50);
  }, { passive: true });
}());
</script>
</body>
</html>
