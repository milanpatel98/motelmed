<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f5f8"/>
      <stop offset="100%" stop-color="#eff1f5"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.9"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- parks / green patches -->
  <g fill="#dcebdc" opacity="0.72">
    <path d="M0 160 L110 130 L180 210 L140 280 L20 300 Z"/>
    <path d="M0 690 L120 640 L210 710 L170 860 L0 860 Z"/>
    <path d="M1420 100 L1560 130 L1600 230 L1510 300 L1390 250 Z"/>
    <path d="M1260 640 L1410 600 L1520 680 L1490 810 L1320 820 Z"/>
  </g>

  <!-- highway corridors -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M620 30 C670 190, 710 340, 745 520 C770 650, 815 780, 850 900" stroke="#8aa1bd" stroke-width="18" opacity="0.36"/>
    <path d="M90 115 C340 180, 480 210, 700 250 C940 295, 1190 290, 1550 225" stroke="#8ea6c2" stroke-width="12" opacity="0.30"/>
    <path d="M1040 70 C990 210, 960 320, 890 460 C830 580, 810 720, 830 860" stroke="#8ea6c2" stroke-width="10" opacity="0.28"/>
  </g>

  <!-- local road network -->
  <g stroke="#ccd2dd" stroke-width="1.3" fill="none" opacity="0.95">
    <path d="M120 250 L290 290 L420 280 L580 310 L690 330 L810 360 L950 350 L1120 380 L1330 360"/>
    <path d="M80 430 L210 410 L360 430 L530 455 L700 450 L860 475 L1030 470 L1220 500 L1450 470"/>
    <path d="M90 620 L250 590 L430 620 L590 640 L760 650 L950 635 L1150 670 L1380 640"/>
    <path d="M210 120 L200 240 L220 360 L200 520 L230 740"/>
    <path d="M360 140 L350 270 L390 420 L360 580 L390 760"/>
    <path d="M520 120 L500 300 L540 430 L520 590 L550 800"/>
    <path d="M900 110 L880 250 L920 390 L900 560 L930 780"/>
    <path d="M1170 120 L1140 300 L1180 450 L1160 640 L1210 830"/>
    <path d="M1360 150 L1330 310 L1370 470 L1350 650 L1400 840"/>
  </g>

  <!-- downtown grid around motel -->
  <g stroke="#c6ccd8" stroke-width="1.1" fill="none" opacity="0.92">
    <path d="M700 410 L910 470"/>
    <path d="M690 445 L900 505"/>
    <path d="M680 480 L890 540"/>
    <path d="M670 515 L880 575"/>
    <path d="M660 550 L870 610"/>
    <path d="M750 380 L680 620"/>
    <path d="M800 395 L730 640"/>
    <path d="M850 410 L780 660"/>
    <path d="M900 425 L830 680"/>
  </g>

  <!-- water-like ribbon -->
  <path d="M780 360 C740 430,740 560,790 650 C815 695,815 760,790 840" stroke="#a8bdd9" stroke-width="22" opacity="0.34" fill="none" filter="url(#soft)"/>

  <!-- motel point -->
  <g transform="translate(900 560)">
    <circle r="16" fill="#d94b48"/>
    <path d="M0 16 L-9 34 L9 34 Z" fill="#d94b48"/>
    <circle r="6" fill="#fff"/>
  </g>

  <!-- label text -->
  <g fill="#646e83" font-family="Inter, Arial, sans-serif">
    <text x="250" y="245" font-size="30" font-weight="500">Ocean Hills</text>
    <text x="830" y="205" font-size="30" font-weight="500">San Marcos</text>
    <text x="690" y="286" font-size="18">W Mission Ave</text>
    <text x="780" y="372" font-size="18">S Escondido Blvd</text>
    <text x="930" y="332" font-size="18">E Valley Pkwy</text>
    <text x="760" y="420" font-size="30" font-weight="500">Escondido</text>
    <text x="705" y="555" font-size="16">I-15</text>
    <text x="560" y="610" font-size="16">W Valley Pkwy</text>
    <text x="1055" y="620" font-size="16">N Midway Dr</text>
    <text x="1110" y="700" font-size="26" font-weight="500">East Canyon</text>
    <text x="925" y="560" font-size="22" font-weight="600" fill="#4b5470">Motel Mediteran</text>
  </g>
</svg>
