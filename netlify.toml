# Netlify — static preview site (HTML/CSS/JS in /preview)
[build]
  command = "node scripts/build-chat-dataset.cjs"
  publish = "preview"

[build.environment]
  NODE_VERSION = "20"

# Serverless functions live in netlify/functions/
[functions]
  directory = "netlify/functions"

# Route the proxy path the JS already uses → the serverless function
[[redirects]]
  from   = "/php/asi-proxy.php"
  to     = "/.netlify/functions/asi-proxy"
  status = 200
  force  = true

# Optional: discourage search engines (does not password-protect the URL)
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
