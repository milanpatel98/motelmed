<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Chat Test — Motel Mediteran</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/mm-booking-strip.css?v=55" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Inter", sans-serif;
        background: #f8f8f6;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #0a0a0a;
      }
      .test-note {
        text-align: center;
        max-width: 360px;
        padding: 40px 24px;
      }
      .test-note h1 {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 32px;
        font-weight: 400;
        margin-bottom: 12px;
      }
      .test-note p {
        font-size: 14px;
        color: rgba(10,10,10,0.55);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="mm-book-data" hidden>
      <input type="hidden" id="mm-book-checkin" name="checkin" value="" autocomplete="off" />
      <input type="hidden" id="mm-book-checkout" name="checkout" value="" autocomplete="off" />
      <input type="hidden" id="mm-book-guests-state" value='[{"adults":2,"children":0}]' autocomplete="off" />
      <input type="hidden" id="mm-book-no-rooms" value="1" autocomplete="off" />
      <input type="hidden" id="mm-book-group-adults" value="2" autocomplete="off" />
      <input type="hidden" id="mm-book-group-children" value="0" autocomplete="off" />
    </div>
    <div class="test-note">
      <h1><span class="notranslate" translate="no">Motel Mediteran</span></h1>
      <p>Chat widget test page. Click the button in the bottom-right corner to try it out.</p>
    </div>

    <aside class="mm-booking-strip mm-booking-strip--dock" id="mm-booking-compact" role="complementary" aria-label="Book your stay" aria-hidden="false">
      <div class="mm-booking-strip__inner">
        <div class="mm-booking-strip__summary">
          <div class="mm-booking-strip__summary-track">
            <span class="mm-booking-strip__name notranslate" translate="no">Motel Mediteran</span>
            <span class="mm-booking-strip__sep" aria-hidden="true">|</span>
            <span class="mm-booking-strip__dates"><span class="mm-booking-strip__range" id="mm-book-compact-range" aria-live="polite"></span></span>
            <span class="mm-booking-strip__sep" aria-hidden="true">|</span>
            <span class="mm-booking-strip__meta" id="mm-book-compact-guests" aria-live="polite">1 Room · 2 Guests</span>
            <a class="mm-booking-strip__change" id="mm-booking-strip-change" href="index.html#mm-booking-inline">Change</a>
          </div>
        </div>
        <div class="mm-booking-strip__action">
          <a
            class="mm-booking-strip__cta mm-booking-sync"
            href="book.html"
           
           
            ><svg
              class="mm-booking-strip__cta-draw"
              viewBox="0 0 100 40"
              preserveAspectRatio="none"
              overflow="visible"
              aria-hidden="true"
              focusable="false"
            >
              <path
                class="mm-booking-strip__cta-draw-path"
                fill="none"
                stroke="currentColor"
                stroke-width="1.25"
                stroke-linecap="butt"
                stroke-linejoin="miter"
                d="M 1 1 L 99 1 L 99 39 L 1 39 Z"
              />
            </svg>
            <span class="mm-booking-strip__cta-text">Reserve</span>
          </a>
        </div>
      </div>
    </aside>

    <script src="js/mm-lang.js?v=5"></script>
    <script src="js/mm-booking-dock.js?v=11"></script>
    <script src="js/mm-booking-calendar.js?v=5"></script>
    <script src="js/mm-booking-guests.js?v=1"></script>
    <script src="js/mm-chat-widget.js?v=41"></script>
  </body>
</html>
